idea:
  title: Mapping Person Space Through Simple Likes and Dislikes
  domain: nlp
  hypothesis: 'The space of personas displayed by large language models (LLMs) is
    likely low-rank and can be mapped by analyzing which sets of likes and dislikes
    LLMs are willing to adopt with minimal training and which combinations feel incongruent
    to the models. These preference patterns may be similar across different LLMs.

    '
  background:
    description: 'LLMs have been known to display different personas. It seems likely
      that the space of personas is low-rank. Can we start mapping out this space
      by just looking at what sets of likes and dislikes LLMs are willing to take
      on with relatively little training (set some arbitrary threshold of N tokens)
      and which likes and dislikes feel incongruent to an LLM? Are these preferences
      similar across LLMs?

      '
